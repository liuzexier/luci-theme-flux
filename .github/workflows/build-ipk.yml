name: Build OpenWrt IPK

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: OpenWrt release version
        required: true
        default: 24.10.7
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86/64
          - mediatek/filogic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            unzip \
            wget \
            zlib1g-dev \
            file \
            zstd

      - name: Build package
        env:
          OPENWRT_VERSION: ${{ inputs.openwrt_version || '24.10.7' }}
          TARGETS: ${{ matrix.target }}
        run: scripts/build-ipk.sh

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-flux-${{ matrix.target == 'x86/64' && 'x86-64' || 'mediatek-filogic' }}
          path: dist/**/*.ipk
          if-no-files-found: error
